<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UC Data Advisor</title>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --border: #2a2d3a;
      --text: #e4e4e7;
      --text-muted: #8b8d97;
      --accent: #3b82f6;
      --accent-hover: #2563eb;
      --user-bg: #1e3a5f;
      --assistant-bg: #1a1d27;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    header svg { width: 28px; height: 28px; color: var(--accent); }

    header h1 {
      font-size: 18px;
      font-weight: 600;
    }

    header span {
      font-size: 13px;
      color: var(--text-muted);
      margin-left: auto;
    }

    #chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .message {
      max-width: 720px;
      width: 100%;
      margin: 0 auto;
      display: flex;
      gap: 12px;
      animation: fadeIn 0.2s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message-icon {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .message.user .message-icon { background: var(--accent); color: white; }
    .message.assistant .message-icon { background: #374151; color: #60a5fa; }

    .message-content {
      flex: 1;
      padding: 12px 16px;
      border-radius: 12px;
      line-height: 1.6;
      font-size: 14px;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .message.user .message-content { background: var(--user-bg); }
    .message.assistant .message-content { background: var(--surface); border: 1px solid var(--border); }

    .message-content code {
      background: rgba(255,255,255,0.08);
      padding: 1px 5px;
      border-radius: 4px;
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 13px;
    }

    .message-content strong { color: #93c5fd; }

    .typing-indicator {
      display: inline-flex;
      gap: 4px;
      padding: 4px 0;
    }

    .typing-indicator span {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--text-muted);
      animation: bounce 1.2s infinite;
    }

    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-6px); }
    }

    #welcome {
      max-width: 600px;
      margin: auto;
      text-align: center;
      padding: 40px 24px;
    }

    #welcome h2 {
      font-size: 24px;
      margin-bottom: 8px;
    }

    #welcome p {
      color: var(--text-muted);
      margin-bottom: 24px;
      font-size: 14px;
    }

    .suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
    }

    .suggestion {
      padding: 8px 16px;
      border: 1px solid var(--border);
      border-radius: 20px;
      background: var(--surface);
      color: var(--text);
      font-size: 13px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .suggestion:hover {
      border-color: var(--accent);
      background: rgba(59, 130, 246, 0.1);
    }

    #input-area {
      padding: 16px 24px 24px;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    #input-form {
      max-width: 720px;
      margin: 0 auto;
      display: flex;
      gap: 8px;
    }

    #input-form textarea {
      flex: 1;
      padding: 12px 16px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--surface);
      color: var(--text);
      font-family: inherit;
      font-size: 14px;
      resize: none;
      outline: none;
      min-height: 44px;
      max-height: 120px;
      line-height: 1.5;
    }

    #input-form textarea:focus { border-color: var(--accent); }
    #input-form textarea::placeholder { color: var(--text-muted); }

    #input-form button {
      padding: 0 16px;
      border: none;
      border-radius: 12px;
      background: var(--accent);
      color: white;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
      align-self: flex-end;
      height: 44px;
    }

    #input-form button:hover { background: var(--accent-hover); }
    #input-form button:disabled { opacity: 0.5; cursor: not-allowed; }
  </style>
</head>
<body>
  <header>
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
      <polyline points="3.27 6.96 12 12.01 20.73 6.96"/>
      <line x1="12" y1="22.08" x2="12" y2="12"/>
    </svg>
    <h1>UC Data Advisor</h1>
    <span>Enbridge Unity Catalog</span>
  </header>

  <div id="chat-container">
    <div id="welcome">
      <h2>What data are you looking for?</h2>
      <p>I can help you discover datasets, explore table schemas, and understand what data is available in Unity Catalog.</p>
      <div class="suggestions">
        <button class="suggestion" onclick="sendSuggestion(this)">What catalogs are available?</button>
        <button class="suggestion" onclick="sendSuggestion(this)">Show me pipeline sensor data</button>
        <button class="suggestion" onclick="sendSuggestion(this)">Do we have safety incident records?</button>
        <button class="suggestion" onclick="sendSuggestion(this)">What commodity price data exists?</button>
        <button class="suggestion" onclick="sendSuggestion(this)">Describe the nominations table</button>
      </div>
    </div>
  </div>

  <div id="input-area">
    <form id="input-form" onsubmit="handleSubmit(event)">
      <textarea
        id="user-input"
        placeholder="Ask about datasets in Unity Catalog..."
        rows="1"
        onkeydown="handleKeydown(event)"
        oninput="autoResize(this)"
      ></textarea>
      <button type="submit" id="send-btn">Send</button>
    </form>
  </div>

  <script>
    const chatContainer = document.getElementById('chat-container');
    const userInput = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');
    let conversationHistory = [];
    let isLoading = false;

    // Session management
    let sessionId = sessionStorage.getItem('uc-advisor-session');
    if (!sessionId) {
      sessionId = crypto.randomUUID();
      sessionStorage.setItem('uc-advisor-session', sessionId);
    }

    // Restore conversation history on load
    (async function restoreHistory() {
      try {
        const res = await fetch(`/api/history/${sessionId}`);
        if (!res.ok) return;
        const data = await res.json();
        if (data.available && data.messages && data.messages.length > 0) {
          for (const msg of data.messages) {
            addMessage(msg.role, msg.content);
            conversationHistory.push({ role: msg.role, content: msg.content });
          }
        }
      } catch (e) {
        // Lakebase not available — no history to restore
      }
    })();

    function autoResize(el) {
      el.style.height = 'auto';
      el.style.height = Math.min(el.scrollHeight, 120) + 'px';
    }

    function handleKeydown(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        handleSubmit(e);
      }
    }

    function sendSuggestion(btn) {
      userInput.value = btn.textContent;
      handleSubmit(new Event('submit'));
    }

    function addMessage(role, content) {
      // Remove welcome on first message
      const welcome = document.getElementById('welcome');
      if (welcome) welcome.remove();

      const div = document.createElement('div');
      div.className = `message ${role}`;
      const icon = role === 'user' ? 'U' : 'A';
      div.innerHTML = `
        <div class="message-icon">${icon}</div>
        <div class="message-content">${formatContent(content)}</div>
      `;
      chatContainer.appendChild(div);
      chatContainer.scrollTop = chatContainer.scrollHeight;
      return div;
    }

    function addTypingIndicator() {
      const div = document.createElement('div');
      div.className = 'message assistant';
      div.id = 'typing';
      div.innerHTML = `
        <div class="message-icon">A</div>
        <div class="message-content">
          <div class="typing-indicator">
            <span></span><span></span><span></span>
          </div>
        </div>
      `;
      chatContainer.appendChild(div);
      chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    function removeTypingIndicator() {
      const el = document.getElementById('typing');
      if (el) el.remove();
    }

    function formatContent(text) {
      // Basic markdown: bold, code, and line breaks
      return text
        .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
        .replace(/`([^`]+)`/g, '<code>$1</code>')
        .replace(/\n/g, '<br>');
    }

    async function handleSubmit(e) {
      e.preventDefault();
      const text = userInput.value.trim();
      if (!text || isLoading) return;

      isLoading = true;
      sendBtn.disabled = true;
      userInput.value = '';
      userInput.style.height = 'auto';

      addMessage('user', text);
      conversationHistory.push({ role: 'user', content: text });

      addTypingIndicator();

      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ messages: conversationHistory, session_id: sessionId }),
        });

        removeTypingIndicator();

        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();

        addMessage('assistant', data.response);
        conversationHistory.push({ role: 'assistant', content: data.response });
      } catch (err) {
        removeTypingIndicator();
        addMessage('assistant', `Sorry, I encountered an error: ${err.message}. Please try again.`);
      }

      isLoading = false;
      sendBtn.disabled = false;
      userInput.focus();
    }
  </script>
</body>
</html>
