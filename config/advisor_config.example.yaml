# ============================================================
# UC Data Advisor Configuration — Example
# ============================================================
# Copy this file:  cp config/advisor_config.example.yaml config/my_config.yaml
# Edit the 3 sections below, then run:
#   uv run python -m src.setup.run --config config/my_config.yaml
#
# This file is the INPUT half of the config — only user-authored fields belong here.
# Pipeline-generated fields (infrastructure IDs, prompts, knowledge base, agent endpoints)
# are written to a sibling file `<name>_config.generated.yaml`. That file is safe to
# delete to force a clean re-run of the pipeline. Do not hand-edit the generated file.
# ============================================================

# 1. Source catalogs to scan (REQUIRED)
source_catalogs:
  - my_catalog_operations
  - my_catalog_analytics

# 2. Workspace connection (REQUIRED)
workspace:
  host: "https://my-workspace.cloud.databricks.com"
  profile: my-profile    # Databricks CLI profile name

# 3. Service principal (REQUIRED)
# Create an SP in your workspace and provide its application (client) ID.
# The pipeline generates OAuth secrets, grants UC/warehouse/Genie permissions,
# and uses it for Model Serving endpoint authentication.
service_principal: "xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx"

# --- Optional overrides ---

# Deployment name — MUST be unique per deployment on the same workspace.
# All resources are namespaced under this: catalog, VS endpoint, Genie Space, endpoints.
# Default: derived from catalog prefix (e.g., "my_catalog_*" -> "my-catalog-advisor")
# app_name: my-project-advisor

# warehouse_id: "abc123def456"                 # SQL warehouse ID (auto-discovered if omitted)
# advisor_catalog: my_project_advisor_catalog  # Default: {app_name}_catalog
# external_location: "my-ext-location-name"    # UC external location for catalog storage (auto-detected)
# serving_model: databricks-claude-opus-4-6    # Foundation model for LLM calls
# embedding_model: databricks-bge-large-en
# include_schemas: []          # Restrict to specific schemas
# exclude_schemas: [staging]   # Skip these schemas
enable_metric_views: false    # Generate metric views and materialized tables
enable_volume_indexing: false # Extract text from volume documents (PDFs, CSVs) for semantic search (default: false)
scale_to_zero: true          # Scale agent endpoints to zero when idle (default: true)
enable_ai_gateway_guardrails: false  # Enable input safety guardrails on agent endpoints
# rate_limits:                       # AI Gateway rate limits on agent endpoints
#   - calls: 120                     # Max number of calls allowed per renewal period
#     key: user                      # Rate limit scope: "user" (per-user) or "endpoint" (shared)
#     renewal_period: minute         # Reset interval: "minute" or "day"
