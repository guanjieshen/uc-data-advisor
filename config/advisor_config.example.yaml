# ============================================================
# UC Data Advisor Configuration — Example
# ============================================================
# Copy this file:  cp config/advisor_config.example.yaml config/advisor_config.yaml
# Edit the 3 sections below, then run:
#   uv run python -m src.setup.run --config config/advisor_config.yaml
# ============================================================

# 1. Source catalogs to scan (REQUIRED)
# List the Unity Catalog catalogs containing your data.
source_catalogs:
  - my_catalog_operations
  - my_catalog_analytics

# 2. Workspace connection (REQUIRED)
# Option A: Use a Databricks CLI profile
workspace:
  host: "https://my-workspace.cloud.databricks.com"
  profile: my-profile    # Databricks CLI profile name

# Option B: Use a Personal Access Token (uncomment and remove profile above)
# workspace:
#   host: "https://my-workspace.cloud.databricks.com"
#   token: "dapi..."     # Databricks PAT

# Option C: Host only — uses existing env vars or CLI default auth
# workspace:
#   host: "https://my-workspace.cloud.databricks.com"

# 3. Grant principal (REQUIRED)
# Additional principal to grant UC/endpoint/Lakebase access to during setup.
# The app's auto-created SP always gets grants automatically.
# type: "service_principal" → auto-grants all permissions
# type: "user" → prints required grants for manual application by an admin
grant_principal:
  type: service_principal
  name: "xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx"  # SP client ID or user email

# --- Optional overrides ---

# App name — MUST be unique per deployment on the same workspace.
# All resources are namespaced under this: catalog, VS endpoint, Lakebase, serving endpoint, Genie Space, app.
# Default: derived from catalog prefix (e.g., "my_catalog_*" -> "my-catalog-advisor")
# app_name: my-project-advisor

# advisor_catalog: my_project_advisor_catalog  # Default: {app_name}_catalog
# external_location: "my-ext-location-name"    # UC external location name for catalog storage (auto-detected if omitted)
# serving_model: databricks-claude-opus-4-6    # Upstream foundation model
# embedding_model: databricks-bge-large-en
# include_schemas: []          # Restrict to specific schemas
# exclude_schemas: [staging]   # Skip these schemas
enable_metric_views: false    # Set to false to skip metric view creation (default: false)
enable_ai_gateway_guardrails: true  # Set to false if workspace doesn't support AI Gateway guardrails

# --- Everything below is auto-generated by the setup pipeline ---
# Do not edit manually.
infrastructure: {}
generated: {}
