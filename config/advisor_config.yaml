  metric_views:
    mv_daily_throughput: "CREATE OR REPLACE VIEW uc_data_advisor.default.mv_daily_throughput\nWITH METRICS\nLANGUAGE YAML\n\
      AS $$\nversion: 1.1\ncomment: \"Metrics for enbridge_operations.gas_processing.daily_throughput\"\nsource: enbridge_operations.gas_processing.daily_throughput\n\
      joins:\n  - name: processing_plants\n    source: enbridge_operations.gas_processing.processing_plants\n    using:\n\
      \      - plant_id\ndimensions:\n  - name: Production Date Month\n    expr: \"DATE_TRUNC('MONTH', production_date)\"\n\
      \    comment: \"Date of production\"\nmeasures:\n  - name: Total Daily Throughput\n    expr: COUNT(1)\n  - name: Total\
      \ Inlet Volume Mmcfd\n    expr: SUM(inlet_volume_mmcfd)\n  - name: Avg Inlet Volume Mmcfd\n    expr: ROUND(AVG(inlet_volume_mmcfd),\
      \ 2)\n  - name: Total Outlet Volume Mmcfd\n    expr: SUM(outlet_volume_mmcfd)\n  - name: Avg Outlet Volume Mmcfd\n \
      \   expr: ROUND(AVG(outlet_volume_mmcfd), 2)\n  - name: Total Shrinkage Pct\n    expr: SUM(shrinkage_pct)\n  - name:\
      \ Avg Shrinkage Pct\n    expr: ROUND(AVG(shrinkage_pct), 2)\n  - name: Total Plant Fuel Mmcfd\n    expr: SUM(plant_fuel_mmcfd)\n\
      \  - name: Avg Plant Fuel Mmcfd\n    expr: ROUND(AVG(plant_fuel_mmcfd), 2)\n  - name: Total Flare Volume Mmcfd\n   \
      \ expr: SUM(flare_volume_mmcfd)\n$$"
    mv_processing_plants: "CREATE OR REPLACE VIEW uc_data_advisor.default.mv_processing_plants\nWITH METRICS\nLANGUAGE YAML\n\
      AS $$\nversion: 1.1\ncomment: \"Metrics for enbridge_operations.gas_processing.processing_plants\"\nsource: enbridge_operations.gas_processing.processing_plants\n\
      dimensions:\n  - name: Plant Name\n    expr: plant_name\n    comment: \"Gas processing plant name\"\n  - name: Region\n\
      \    expr: region\n    comment: \"Geographic operating region\"\n  - name: Plant Type\n    expr: plant_type\n    comment:\
      \ \"Processing technology: Cryogenic, Lean Oil, or Refrigeration\"\n  - name: Status\n    expr: status\n    comment:\
      \ \"Current plant status\"\nmeasures:\n  - name: Total Processing Plants\n    expr: COUNT(1)\n  - name: Total Capacity\
      \ Mmcfd\n    expr: SUM(capacity_mmcfd)\n  - name: Avg Capacity Mmcfd\n    expr: ROUND(AVG(capacity_mmcfd), 2)\n  - name:\
      \ Total Commissioning Year\n    expr: SUM(commissioning_year)\n  - name: Avg Commissioning Year\n    expr: ROUND(AVG(commissioning_year),\
      \ 2)\n  - name: Total Latitude\n    expr: SUM(latitude)\n  - name: Avg Latitude\n    expr: ROUND(AVG(latitude), 2)\n\
      \  - name: Total Longitude\n    expr: SUM(longitude)\n  - name: Avg Longitude\n    expr: ROUND(AVG(longitude), 2)\n\
      $$"
    mv_product_yields: "CREATE OR REPLACE VIEW uc_data_advisor.default.mv_product_yields\nWITH METRICS\nLANGUAGE YAML\nAS\
      \ $$\nversion: 1.1\ncomment: \"Metrics for enbridge_operations.gas_processing.product_yields\"\nsource: enbridge_operations.gas_processing.product_yields\n\
      joins:\n  - name: processing_plants\n    source: enbridge_operations.gas_processing.processing_plants\n    using:\n\
      \      - plant_id\ndimensions:\n  - name: Product\n    expr: product\n    comment: \"Output product: Methane, Ethane,\
      \ Propane, Butane, NGL Mix, or Condensate\"\n  - name: Spec Met\n    expr: spec_met\n    comment: \"Whether the product\
      \ met pipeline specifications\"\n  - name: Production Date Month\n    expr: \"DATE_TRUNC('MONTH', production_date)\"\
      \n    comment: \"Date of production\"\nmeasures:\n  - name: Total Product Yields\n    expr: COUNT(1)\n  - name: Total\
      \ Volume Bpd\n    expr: SUM(volume_bpd)\n  - name: Avg Volume Bpd\n    expr: ROUND(AVG(volume_bpd), 2)\n  - name: Total\
      \ Purity Pct\n    expr: SUM(purity_pct)\n  - name: Avg Purity Pct\n    expr: ROUND(AVG(purity_pct), 2)\n$$"
    mv_inspection_reports: "CREATE OR REPLACE VIEW uc_data_advisor.default.mv_inspection_reports\nWITH METRICS\nLANGUAGE YAML\n\
      AS $$\nversion: 1.1\ncomment: \"Metrics for enbridge_operations.pipeline_monitoring.inspection_reports\"\nsource: enbridge_operations.pipeline_monitoring.inspection_reports\n\
      joins:\n  - name: pipelines\n    source: enbridge_operations.pipeline_monitoring.pipelines\n    using:\n      - pipeline_id\n\
