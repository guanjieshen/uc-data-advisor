    - name: enbridge_operations
      comment: The catalog contains data related to operational processes and activities within the organization. It includes
        schemas that cover infrastructure management, maintenance logs, resource scheduling, and operational performance metrics.
        This catalog is intended for use in monitoring, analyzing, and optimizing day-to-day operations and asset management.
      owner: allan.cao@databricks.com
      schema_count: 3
      table_count: 10
    - name: enbridge_commercial
      comment: The enbridge_commercial catalog contains data related to commercial operations. It includes schemas that organize
        information on contracts, customer accounts, billing, and revenue management. Use this catalog for analyzing commercial
        performance, managing customer relationships, and supporting financial reporting within the commercial business domain.
      owner: allan.cao@databricks.com
      schema_count: 2
      table_count: 5
