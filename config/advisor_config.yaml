      \  - name: Avg Station Start Km\n    expr: ROUND(AVG(station_start_km), 2)\n  - name: Total Station End Km\n    expr:\
      \ SUM(station_end_km)\n$$"
    mv_maintenance_work_orders: "CREATE OR REPLACE VIEW uc_data_advisor.default.mv_maintenance_work_orders\nWITH METRICS\n\
