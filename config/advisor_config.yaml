    mv_pipeline_sensors: "CREATE OR REPLACE VIEW uc_data_advisor.default.mv_pipeline_sensors\nWITH METRICS\nLANGUAGE YAML\n\
      AS $$\nversion: 1.1\ncomment: \"Metrics for enbridge_operations.pipeline_monitoring.pipeline_sensors\"\nsource: enbridge_operations.pipeline_monitoring.pipeline_sensors\n\
      joins:\n  - name: pipelines\n    source: enbridge_operations.pipeline_monitoring.pipelines\n    using:\n      - pipeline_id\n\
      dimensions:\n  - name: Sensor Type\n    expr: sensor_type\n    comment: \"Type of measurement: Pressure, Temperature,\
      \ Flow Rate, or Vibration\"\n  - name: Unit\n    expr: unit\n    comment: \"Unit of measurement for the reading\"\n\
      \  - name: Quality Flag\n    expr: quality_flag\n    comment: \"Data quality indicator: Good, Suspect, or Bad\"\n  -\
      \ name: Reading Timestamp Month\n    expr: \"DATE_TRUNC('MONTH', reading_timestamp)\"\n    comment: \"Timestamp when\
      \ the reading was taken\"\nmeasures:\n  - name: Total Pipeline Sensors\n    expr: COUNT(1)\n  - name: Total Reading\
      \ Value\n    expr: SUM(reading_value)\n  - name: Avg Reading Value\n    expr: ROUND(AVG(reading_value), 2)\n  - name:\
      \ Total Station Km\n    expr: SUM(station_km)\n  - name: Avg Station Km\n    expr: ROUND(AVG(station_km), 2)\n$$"
    mv_pipelines: "CREATE OR REPLACE VIEW uc_data_advisor.default.mv_pipelines\nWITH METRICS\nLANGUAGE YAML\nAS $$\nversion:\
      \ 1.1\ncomment: \"Metrics for enbridge_operations.pipeline_monitoring.pipelines\"\nsource: enbridge_operations.pipeline_monitoring.pipelines\n\
      dimensions:\n  - name: Pipeline Name\n    expr: pipeline_name\n    comment: \"Human-readable pipeline designation\"\n\
      \  - name: Pipeline Type\n    expr: pipeline_type\n    comment: \"Product transported: Natural Gas, Crude Oil, NGL,\
