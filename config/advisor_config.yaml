      \  - name: Avg Measurement Value\n    expr: ROUND(AVG(measurement_value), 2)\n$$"
    mv_incidents: "CREATE OR REPLACE VIEW uc_data_advisor.default.mv_incidents\nWITH METRICS\nLANGUAGE YAML\nAS $$\nversion:\
      \ 1.1\ncomment: \"Metrics for enbridge_operations.safety_compliance.incidents\"\nsource: enbridge_operations.safety_compliance.incidents\n\
      dimensions:\n  - name: Incident Type\n    expr: incident_type\n    comment: \"Classification of the incident\"\n  -\
      \ name: Severity\n    expr: severity\n    comment: \"Severity level: Low, Medium, High, or Critical\"\n  - name: Root\
      \ Cause\n    expr: root_cause\n    comment: \"Identified root cause of the incident\"\n  - name: Region\n    expr: region\n\
      \    comment: \"Region where the incident occurred\"\n  - name: Investigation Status\n    expr: investigation_status\n\
      \    comment: \"Current investigation status\"\n  - name: Incident Date Month\n    expr: \"DATE_TRUNC('MONTH', incident_date)\"\
      \n    comment: \"Date of the incident\"\nmeasures:\n  - name: Total Incidents\n    expr: COUNT(1)\n  - name: Total Injuries\n\
      \    expr: SUM(injuries)\n  - name: Avg Injuries\n    expr: ROUND(AVG(injuries), 2)\n  - name: Total Days Lost\n   \
      \ expr: SUM(days_lost)\n  - name: Avg Days Lost\n    expr: ROUND(AVG(days_lost), 2)\n  - name: Total Corrective Actions\
      \ Count\n    expr: SUM(corrective_actions_count)\n  - name: Avg Corrective Actions Count\n    expr: ROUND(AVG(corrective_actions_count),\
      \ 2)\n$$"
    mv_regulatory_filings: "CREATE OR REPLACE VIEW uc_data_advisor.default.mv_regulatory_filings\nWITH METRICS\nLANGUAGE YAML\n\
      AS $$\nversion: 1.1\ncomment: \"Metrics for enbridge_operations.safety_compliance.regulatory_filings\"\nsource: enbridge_operations.safety_compliance.regulatory_filings\n\
      dimensions:\n  - name: Regulatory Agency\n    expr: regulatory_agency\n    comment: \"Regulatory body: PHMSA, NEB/CER,\
      \ AER, TCEQ, or EPA\"\n  - name: Filing Type\n    expr: filing_type\n    comment: \"Type of regulatory filing\"\n  -\
      \ name: Status\n    expr: status\n    comment: \"Current filing status\"\n  - name: Region\n    expr: region\n    comment:\
      \ \"Applicable regulatory region\"\n  - name: Filing Date Month\n    expr: \"DATE_TRUNC('MONTH', filing_date)\"\n  \
      \  comment: \"Date the filing was submitted\"\n  - name: Due Date Month\n    expr: \"DATE_TRUNC('MONTH', due_date)\"\
      \n    comment: \"Filing due date\"\nmeasures:\n  - name: Total Regulatory Filings\n    expr: COUNT(1)\n  - name: Total\
      \ Compliance Year\n    expr: SUM(compliance_year)\n  - name: Avg Compliance Year\n    expr: ROUND(AVG(compliance_year),\
      \ 2)\n$$"
    mv_nominations: "CREATE OR REPLACE VIEW uc_data_advisor.default.mv_nominations\nWITH METRICS\nLANGUAGE YAML\nAS $$\nversion:\
      \ 1.1\ncomment: \"Metrics for enbridge_commercial.contracts.nominations\"\nsource: enbridge_commercial.contracts.nominations\n\
      joins:\n  - name: shippers\n    source: enbridge_commercial.contracts.shippers\n    using:\n      - shipper_id\n  -\
      \ name: pipelines\n    source: enbridge_operations.pipeline_monitoring.pipelines\n    using:\n      - pipeline_id\n\
      dimensions:\n  - name: Nomination Cycle\n    expr: nomination_cycle\n    comment: \"NAESB nomination cycle\"\n  - name:\
      \ Status\n    expr: status\n    comment: \"Nomination confirmation status\"\n  - name: Gas Day Month\n    expr: \"DATE_TRUNC('MONTH',\
      \ gas_day)\"\n    comment: \"Gas day for the nomination\"\nmeasures:\n  - name: Total Nominations\n    expr: COUNT(1)\n\
      \  - name: Total Nominated Volume Gj\n    expr: SUM(nominated_volume_gj)\n  - name: Avg Nominated Volume Gj\n    expr:\
      \ ROUND(AVG(nominated_volume_gj), 2)\n  - name: Total Scheduled Volume Gj\n    expr: SUM(scheduled_volume_gj)\n  - name:\
      \ Avg Scheduled Volume Gj\n    expr: ROUND(AVG(scheduled_volume_gj), 2)\n  - name: Total Actual Volume Gj\n    expr:\
      \ SUM(actual_volume_gj)\n  - name: Avg Actual Volume Gj\n    expr: ROUND(AVG(actual_volume_gj), 2)\n$$"
    mv_transportation_contracts: "CREATE OR REPLACE VIEW uc_data_advisor.default.mv_transportation_contracts\nWITH METRICS\n\
      LANGUAGE YAML\nAS $$\nversion: 1.1\ncomment: \"Metrics for enbridge_commercial.contracts.transportation_contracts\"\n\
      source: enbridge_commercial.contracts.transportation_contracts\njoins:\n  - name: shippers\n    source: enbridge_commercial.contracts.shippers\n\
      \    using:\n      - shipper_id\n  - name: pipelines\n    source: enbridge_operations.pipeline_monitoring.pipelines\n\
      \    using:\n      - pipeline_id\ndimensions:\n  - name: Contract Type\n    expr: contract_type\n    comment: \"Firm,\
      \ Interruptible, or Seasonal\"\n  - name: Status\n    expr: status\n    comment: \"Current contract status\"\n  - name:\
      \ Effective Date Month\n    expr: \"DATE_TRUNC('MONTH', effective_date)\"\n    comment: \"Contract start date\"\n  -\
      \ name: Expiry Date Month\n    expr: \"DATE_TRUNC('MONTH', expiry_date)\"\n    comment: \"Contract end date\"\nmeasures:\n\
      \  - name: Total Transportation Contracts\n    expr: COUNT(1)\n  - name: Total Contracted Volume Gj Day\n    expr: SUM(contracted_volume_gj_day)\n\
      \  - name: Avg Contracted Volume Gj Day\n    expr: ROUND(AVG(contracted_volume_gj_day), 2)\n  - name: Total Rate Per\
      \ Gj\n    expr: SUM(rate_per_gj)\n  - name: Avg Rate Per Gj\n    expr: ROUND(AVG(rate_per_gj), 2)\n  - name: Total Take\
      \ Or Pay Pct\n    expr: SUM(take_or_pay_pct)\n  - name: Avg Take Or Pay Pct\n    expr: ROUND(AVG(take_or_pay_pct), 2)\n\
      $$"
    mv_commodity_prices: "CREATE OR REPLACE VIEW uc_data_advisor.default.mv_commodity_prices\nWITH METRICS\nLANGUAGE YAML\n\
      AS $$\nversion: 1.1\ncomment: \"Metrics for enbridge_commercial.market_data.commodity_prices\"\nsource: enbridge_commercial.market_data.commodity_prices\n\
      dimensions:\n  - name: Hub\n    expr: hub\n    comment: \"Trading hub: AECO, Henry Hub, Dawn, Empress, or Chicago Citygate\"\
      \n  - name: Commodity\n    expr: commodity\n    comment: \"Commodity type\"\n  - name: Currency\n    expr: currency\n\
      \    comment: \"Price currency (CAD or USD)\"\n  - name: Trade Date Month\n    expr: \"DATE_TRUNC('MONTH', trade_date)\"\
      \n    comment: \"Date of the price observation\"\nmeasures:\n  - name: Total Commodity Prices\n    expr: COUNT(1)\n\
      \  - name: Total Price Per Gj\n    expr: SUM(price_per_gj)\n  - name: Avg Price Per Gj\n    expr: ROUND(AVG(price_per_gj),\
      \ 2)\n  - name: Total Volume Traded Gj\n    expr: SUM(volume_traded_gj)\n  - name: Avg Volume Traded Gj\n    expr: ROUND(AVG(volume_traded_gj),\
      \ 2)\n$$"
    mv_supply_demand_forecast: "CREATE OR REPLACE VIEW uc_data_advisor.default.mv_supply_demand_forecast\nWITH METRICS\nLANGUAGE\
      \ YAML\nAS $$\nversion: 1.1\ncomment: \"Metrics for enbridge_commercial.market_data.supply_demand_forecast\"\nsource:\
      \ enbridge_commercial.market_data.supply_demand_forecast\ndimensions:\n  - name: Region\n    expr: region\n    comment:\
      \ \"Geographic region of the forecast\"\n  - name: Scenario\n    expr: scenario\n    comment: \"Planning scenario: Base,\
      \ High Growth, Low Growth, or Constrained\"\n  - name: Forecast Date Month\n    expr: \"DATE_TRUNC('MONTH', forecast_date)\"\
      \n    comment: \"Date the forecast applies to\"\nmeasures:\n  - name: Total Supply Demand Forecast\n    expr: COUNT(1)\n\
      \  - name: Total Supply Bcfd\n    expr: SUM(supply_bcfd)\n  - name: Avg Supply Bcfd\n    expr: ROUND(AVG(supply_bcfd),\
      \ 2)\n  - name: Total Demand Bcfd\n    expr: SUM(demand_bcfd)\n  - name: Avg Demand Bcfd\n    expr: ROUND(AVG(demand_bcfd),\
      \ 2)\n  - name: Total Export Capacity Bcfd\n    expr: SUM(export_capacity_bcfd)\n  - name: Avg Export Capacity Bcfd\n\
      \    expr: ROUND(AVG(export_capacity_bcfd), 2)\n  - name: Total Price Forecast Per Gj\n    expr: SUM(price_forecast_per_gj)\n\
      \  - name: Avg Price Forecast Per Gj\n    expr: ROUND(AVG(price_forecast_per_gj), 2)\n$$"
