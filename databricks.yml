bundle:
  name: uc-data-advisor

variables:
  catalog:
    description: Unity Catalog catalog name
    default: uc_data_advisor
  schema:
    description: Schema for UC Advisor resources
    default: default
  warehouse_id:
    description: SQL Warehouse ID for queries
    default: 23bf2a865893d648

targets:
  dev:
    mode: development
    default: true
    workspace:
      host: https://fevm-enbridge.cloud.databricks.com
      profile: enbridge
    variables:
      catalog: uc_data_advisor
      schema: default

  prod:
    mode: production
    workspace:
      host: https://fevm-enbridge.cloud.databricks.com
      profile: enbridge
    variables:
      catalog: uc_data_advisor
      schema: default

include:
  - resources/*.yml
