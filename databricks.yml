bundle:
  name: uc-data-advisor

variables:
  catalog:
    description: Unity Catalog catalog name
    default: cjc_aws_workspace_catalog
  schema:
    description: Schema for UC Advisor resources
    default: uc_advisor
  warehouse_id:
    description: SQL Warehouse ID for queries
    default: 751fe324525584e5

targets:
  dev:
    mode: development
    default: true
    workspace:
      host: https://fevm-cjc-aws-workspace.cloud.databricks.com
      profile: fevm-cjc
    variables:
      catalog: cjc_aws_workspace_catalog
      schema: uc_advisor_dev

  prod:
    mode: production
    workspace:
      host: https://fevm-cjc-aws-workspace.cloud.databricks.com
      profile: fevm-cjc
    variables:
      catalog: cjc_aws_workspace_catalog
      schema: uc_advisor

include:
  - resources/*.yml
